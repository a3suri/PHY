<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* Header */

.ss{font-size:.75rem;color:var(--t3);margin-top:.25rem}
.seclbl{font-size:.625rem;letter-spacing:.25em;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:.625rem}
/* Activity bars */
.abcard{border-radius:1rem;border:1px solid var(--b1);background:rgba(23,23,23,.4);padding:1rem;margin-bottom:1.25rem}

.wctp{display:flex;align-items:baseline;justify-content:space-between}

.phcard{border-radius:.75rem;border:1px solid var(--b1);background:rgba(23,23,23,.3);padding:.75rem}

.himp-title{font-size:.875rem;color:var(--t1);font-weight:500;margin-bottom:.3rem}

<script>
// =========================================================
// DATA
// =========================================================
const DAYS=['mon','tue','wed','thu','fri','sat','sun'];
const DAY_NAMES={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
const DAY_SHORT={mon:'M',tue:'T',wed:'W',thu:'T',fri:'F',sat:'S',sun:'S'};
const DAY_JS=['sun','mon','tue','wed','thu','fri','sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const ACT={
  'gym-a':{color:'#fb923c',tint:'rgba(251,146,60,0.12)',border:'rgba(251,146,60,0.3)',icon:'🏋',label:'Gym A'},
  'gym-b':{color:'#fb923c',tint:'rgba(251,146,60,0.12)',border:'rgba(251,146,60,0.3)',icon:'🏋',label:'Gym B'},
  'gym-c':{color:'#fb923c',tint:'rgba(251,146,60,0.12)',border:'rgba(251,146,60,0.3)',icon:'🏋',label:'Gym C'},
  'run':  {color:'#60a5fa',tint:'rgba(96,165,250,0.12)',border:'rgba(96,165,250,0.3)',icon:'🏃',label:'Run'},
  'yoga': {color:'#a3e635',tint:'rgba(163,230,53,0.12)',border:'rgba(163,230,53,0.3)',icon:'🧘',label:'Yoga'},
  'golf': {color:'#c084fc',tint:'rgba(192,132,252,0.12)',border:'rgba(192,132,252,0.3)',icon:'⛳',label:'Golf'},
  'swim': {color:'#22d3ee',tint:'rgba(34,211,238,0.12)',border:'rgba(34,211,238,0.3)',icon:'🏊',label:'Swim'},
  'rest': {color:'#737373',tint:'rgba(115,115,115,0.1)',border:'rgba(115,115,115,0.3)',icon:'☕',label:'Rest'},
};

const SCHED={
  1: {ph:1,d:{mon:'gym-a',tue:'run',wed:'yoga',thu:'gym-b',fri:'rest', sat:'golf',sun:'rest'}},
  2: {ph:1,d:{mon:'gym-a',tue:'run',wed:'yoga',thu:'gym-b',fri:'run',  sat:'golf',sun:'rest'}},
  3: {ph:1,d:{mon:'gym-a',tue:'run',wed:'yoga',thu:'gym-b',fri:'run',  sat:'golf',sun:'swim'}},

const KEY='prgm-v2';

  clearTimeout(_st);

// =========================================================
// HELPERS
// =========================================================
function todayDayKey(){return DAY_JS[new Date().getDay()];}
function isoToday(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){const d=new Date(iso);return d.getDate()+' '+MONTHS[d.getMonth()];}
function fmtLong(){return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}

function getDetail(aid,week){
  const m=ACT[aid];if(!m)return null;
  if(aid.startsWith('gym')){const g=GYM[aid];return{...m,name:g.name,focus:g.focus,items:g.ex,isGym:true};}
  if(aid==='run') return{...m,name:'Run Intervals',focus:RUN[week],items:null};
  if(aid==='yoga')return{...m,name:'Yoga / Mobility',focus:'40–45 min flow',items:YOGA};
  if(aid==='swim')return{...m,name:'Swim',focus:'25–30 min',items:SWIM};
  if(aid==='golf')return{...m,name:'Golf',focus:'Walk the course',items:GOLF};
  return{...m,name:'Rest Day',focus:'Recovery — optional 20 min walk',items:null};
}

function exState(comp,idx){
  const e=comp?.exercises?.[idx];
  if(!e&&e!==0)return{done:false,sets:[]};
  if(typeof e==='boolean')return{done:e,sets:[]};
  return{done:!!e.done,sets:e.sets||[]};
}

function isBW(ex){return ex.bw||/Plank|Dead Bug|Push.?up|Lunge|Crunch/i.test(ex.n);}

function findPrev(exName,curWeek,curDay){
  // Check user logs (backward from current)
  const curDi=DAYS.indexOf(curDay);
  for(let w=curWeek;w>=1;w--){
    const maxDi=(w===curWeek)?curDi-1:DAYS.length-1;
    for(let di=maxDi;di>=0;di--){
      const d=DAYS[di];
      const c=S.completions['w'+w+'-'+d];
      if(!c?.exercises)continue;
      const aid=SCHED[w]?.d[d];
      if(!aid?.startsWith('gym'))continue;
      const g=GYM[aid];if(!g)continue;
      const ei=g.ex.findIndex(e=>e.n===exName);
      if(ei<0)continue;
      const es=exState(c,ei);
      if(es.sets.some(s=>s?.weight||s?.reps))
        return{sets:es.sets,label:'Wk '+w,source:'log'};
    }
  }
  // Check HIST
  let best=null,bestD=null;
  for(const h of HIST){
    if(!h.ex[exName])continue;
    const d=new Date(h.date);
    if(!bestD||d>bestD){
      bestD=d;
      best={
        sets:h.ex[exName].map(s=>({weight:s.w||'',reps:s.r||''})),
        label:fmtDate(h.date)+(h.loc?' · '+h.loc:''),
        source:'hist'
      };
    }
  }
  return best;
}

  const app=document.getElementById('app');
  app.innerHTML='';

  if(S.tab==='today')     app.appendChild(mkToday());
  else if(S.tab==='week') app.appendChild(mkWeek());

}

      <div class="cfoc">${det.focus}</div>
    </div>`;
  hdr.onclick=()=>{S.expanded=(expanded?null:day);save();render();};
  card.appendChild(hdr);

  // Swap bar
  const swapBar=document.createElement('button');
  swapBar.className='swap-bar'+(S.swapping===_sk?' open':'');
  swapBar.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
    <span>${S.swapping===_sk?'▲ cancel':'Change session'}</span>`;
  swapBar.onclick=(e)=>{e.stopPropagation();S.swapping=(S.swapping===_sk?null:_sk);save();render();};
  card.appendChild(swapBar);

  // Activity picker
  if(S.swapping===_sk){
    const picker=document.createElement('div');picker.className='act-picker';
    Object.entries(ACT).forEach(([id,m])=>{
      const pill=document.createElement('button');pill.className='act-pill';
      const isCur=id===aid;
      pill.style.cssText=`border-color:${m.border};background:${isCur?m.color:m.tint};color:${isCur?'#0a0a0a':'var(--t1)'}`;
      pill.innerHTML=`${m.icon} ${m.label}`;
      pill.onclick=()=>{
        if(id===SCHED[week].d[day]){if(S.overrides)delete S.overrides[_sk];}
        else{if(!S.overrides)S.overrides={};S.overrides[_sk]=id;}
        S.swapping=null;save();render();
      };
      picker.appendChild(pill);
    });
    card.appendChild(picker);
  }


  if(expanded){
    const exp=document.createElement('div');exp.className='cexp fade';
    const inner=document.createElement('div');inner.className='cein';

    if(det.isGym && det.items){
      det.items.forEach((ex,ei)=>{
        const es=exState(comp,ei);
        const prev=findPrev(ex.n,week,day);
        const bw=isBW(ex);
        const numSets=ex.s;

        const row=document.createElement('div');row.className='exrow';

        // Header row
        const rowHdr=document.createElement('div');rowHdr.className='exhdr';
        const ckBtn=document.createElement('button');
        ckBtn.className='ck'+(es.done?' on':'');
        ckBtn.style.background=es.done?det.color:'transparent';
        ckBtn.innerHTML=es.done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'';
        ckBtn.onclick=()=>toggleEx(compKey,ei,es,det.color,ckBtn,nmEl);
        const nmEl=document.createElement('span');nmEl.className='exnm'+(es.done?' dn':'');nmEl.textContent=ex.n;
        const mtEl=document.createElement('span');mtEl.className='exmt mf';
        mtEl.innerHTML=`${ex.s} × ${ex.r}<span class="exrs">${ex.rest}</span>`;
        rowHdr.append(ckBtn,nmEl,mtEl);

        // Sets grid
        const grid=document.createElement('div');
        grid.className='sgrid';
        grid.style.gridTemplateColumns=`repeat(${numSets},minmax(0,1fr))`;

        for(let si=0;si<numSets;si++){
          const s=es.sets[si]||{};
          const pw=prev?.sets[si]?.weight||'';
          const pr=prev?.sets[si]?.reps||'';
          const sc=document.createElement('div');
          sc.className='scard'+(s.weight||s.reps?' fi':'');
          sc.dataset.key=compKey;sc.dataset.ei=ei;sc.dataset.si=si;

          let inner2=`<div class="snum mf">SET ${si+1}</div>`;
          if(!bw){
            inner2+=`<input class="sinp wt" type="text" inputmode="decimal" placeholder="${pw||'—'}" value="${s.weight||''}" data-f="weight" data-key="${compKey}" data-ei="${ei}" data-si="${si}">`;
            inner2+=`<div class="sunt mf">kg</div>`;
          }
          inner2+=`<input class="sinp rp" type="text" inputmode="numeric" placeholder="${pr||'—'}" value="${s.reps||''}" data-f="reps" data-key="${compKey}" data-ei="${ei}" data-si="${si}">`;
          inner2+=`<div class="sunt mf">reps</div>`;
          sc.innerHTML=inner2;
          grid.appendChild(sc);
        }

        row.append(rowHdr,grid);

        // Progression hint
        if(prev){
          const ph2=document.createElement('div');ph2.className='pvhint';
          const setTxt=prev.sets.slice(0,4).map(s=>{
            const p=[];if(s.weight)p.push(s.weight+'kg');if(s.reps)p.push(s.reps);
            return'<span class="pvset">'+p.join('×')+'</span>';
          }).join(' <span style="color:#3d3d3d">·</span> ');

          let deltaBadge='';
          const prevW=parseFloat(prev.sets[0]?.weight);
          const curW=parseFloat(es.sets[0]?.weight);
          if(!isNaN(prevW)&&!isNaN(curW)&&curW!==prevW){
            const d=curW-prevW;
            deltaBadge=`<span class="delta" style="color:${d>0?det.color:'#a3a3a3'};background:${d>0?det.color+'20':'transparent'}">${d>0?'+':''}${d}kg</span>`;
          }
          ph2.innerHTML=`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            <span class="pvtxt mf"><span style="color:#525252">Last (${prev.label}):</span> ${setTxt}</span>${deltaBadge}`;
          row.appendChild(ph2);
        }
        inner.appendChild(row);
      });
    } else if(det.items){
      det.items.forEach((item,ii)=>{
        const es=exState(comp,ii);
        const isYoga=aid==='yoga';
        const tgt=item.d||item.duration||'';
        const row=document.createElement('div');row.className='irow';row.style.cursor='pointer';
        const ckBtn=document.createElement('button');
        ckBtn.className='ck'+(es.done?' on':'');
        ckBtn.style.background=es.done?det.color:'transparent';
        ckBtn.innerHTML=es.done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'';
        const nm=document.createElement('span');nm.className='inm'+(es.done?' dn':'');nm.textContent=item.n||item.name;
        const mt=document.createElement('span');mt.className='imt mf';mt.textContent=isYoga?'':tgt;
        ckBtn.onclick=(e)=>{e.stopPropagation();
          const c=S.completions[compKey]||{exercises:{}};
          const exs={...c.exercises};const cur=exState({exercises:exs},ii);
          exs[ii]={done:!cur.done,sets:cur.sets,actual:cur.actual};
          S.completions={...S.completions,[compKey]:{...c,exercises:exs}};save();render();};
        row.append(ckBtn,nm,mt);
        if(isYoga){
          const aw=document.createElement('div');aw.className='actual-wrap';
          const al=document.createElement('span');al.className='actual-lbl';al.textContent=tgt;
          const ai=document.createElement('input');ai.className='actual-inp';
          ai.type='text';ai.placeholder='actual';ai.value=es.actual||'';
          ai.setAttribute('data-compkey',compKey);ai.setAttribute('data-yogi',ii);
          ai.onclick=(e)=>e.stopPropagation();
          aw.append(al,ai);row.appendChild(aw);
        }
        row.onclick=()=>ckBtn.onclick(new Event('click'));
        inner.appendChild(row);
      });
    }

    // Run log
    if(aid==='run'){
      const rl=comp.runLog||{};
      const plan=RUN[week]||'';
      const parts=plan.match(/×\s*(\d+)/);
      const maxIntvl=parts?parts[1]:'';
      const ls=document.createElement('div');ls.className='log-sect';
      ls.innerHTML='<div class="log-lbl">Log your run</div>';
      const r1=document.createElement('div');r1.className='log-row';
      r1.innerHTML=`<span class="log-key">Intervals</span>
        <input class="log-inp" type="text" inputmode="numeric" placeholder="${maxIntvl||'—'}" value="${rl.intervals||''}" data-logkey="${compKey}" data-logf="intervals" style="width:3.5rem;flex:none">
        <span class="log-val">${maxIntvl?'of '+maxIntvl:''}</span>`;
      const r2=document.createElement('div');r2.className='log-row';
      r2.innerHTML=`<span class="log-key">Total time</span>
        <input class="log-inp" type="text" inputmode="decimal" placeholder="mins" value="${rl.minutes||''}" data-logkey="${compKey}" data-logf="minutes" style="width:3.5rem;flex:none">
        <span class="log-val">min</span>`;
      const r3=document.createElement('div');r3.className='log-row';
      r3.innerHTML=`<span class="log-key">Notes</span>`;
      const ta=document.createElement('textarea');ta.className='log-textarea';ta.rows=2;
      ta.placeholder='How did it feel?';ta.value=rl.notes||'';
      ta.setAttribute('data-logkey',compKey);ta.setAttribute('data-logf','notes');
      r3.appendChild(ta);
      ls.append(r1,r2,r3);inner.appendChild(ls);
    }
    exp.appendChild(inner);
    card.appendChild(exp);

    // Complete button
    if(aid!=='rest'){
      const ca=document.createElement('div');ca.className='carea';
      const cb=document.createElement('button');
      cb.className='cbtn'+(isDone?' dn':'');
      cb.style.background=isDone?'':det.color;
      if(isDone){
        const dt=comp.completedAt?new Date(comp.completedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
        cb.innerHTML=`<span style="display:flex;align-items:center;justify-content:center;gap:.5rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          COMPLETE${dt?` <span style="color:#525252">· ${dt}</span>`:''}
        </span>`;
      }else{cb.textContent='MARK COMPLETE';}
      cb.onclick=()=>{
        const c=S.completions[compKey]||{};
        S.completions={...S.completions,[compKey]:{...c,done:!c.done,completedAt:!c.done?isoToday():null}};
        save();render();
      };
      ca.appendChild(cb);card.appendChild(ca);
    } else {
      const rm=document.createElement('div');rm.className='rest-msg';rm.innerHTML='Rest is part of the programme. Take it.<br><span style="font-size:.625rem;color:#525252;font-family:JetBrains Mono,monospace;letter-spacing:.05em">Tap ⇄ above to switch to another activity</span>';
      card.appendChild(rm);
    }
  }
  return card;
}

function toggleEx(compKey,ei,es,color,ckBtn,nmEl){
  const c=S.completions[compKey]||{exercises:{}};
  const exs={...c.exercises};
  exs[ei]={done:!es.done,sets:es.sets};
  S.completions={...S.completions,[compKey]:{...c,exercises:exs}};
  save();
  // targeted DOM update — no full re-render
  const newDone=!es.done;
  ckBtn.className='ck'+(newDone?' on':'');
  ckBtn.style.background=newDone?color:'transparent';
  ckBtn.innerHTML=newDone?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'';
  nmEl.className='exnm'+(newDone?' dn':'');
  es.done=newDone;
}

// =========================================================
// INPUT EVENTS — attached after render via delegation
// =========================================================
document.addEventListener('input',e=>{
  // Yoga actual duration inputs
  if(e.target.classList.contains('actual-inp')){
    const inp=e.target;
    const ck=inp.getAttribute('data-compkey');const yi=+inp.getAttribute('data-yogi');
    if(ck){
      const c=S.completions[ck]||{exercises:{}};
      const exs={...(c.exercises||{})};
      const cur=exState({exercises:exs},yi);
      exs[yi]={...cur,actual:inp.value};
      S.completions={...S.completions,[ck]:{...c,exercises:exs}};save();
    }return;
  }
  // Run / generic log inputs
  if(e.target.hasAttribute('data-logkey')){
    const inp=e.target;
    const lk=inp.getAttribute('data-logkey');const lf=inp.getAttribute('data-logf');
    if(lk&&lf){
      const c=S.completions[lk]||{};
      const rl={...(c.runLog||{})};rl[lf]=inp.value;
      S.completions={...S.completions,[lk]:{...c,runLog:rl}};save();
    }return;
  }
  const inp=e.target;
  if(!inp.classList.contains('sinp'))return;
  const {key,ei,si,f}=inp.dataset;
  if(!key)return;
  const c=S.completions[key]||{exercises:{}};
  const exs={...c.exercises};
  const es=exState({exercises:exs},+ei);
  const sets=es.sets.slice();
  while(sets.length<=+si)sets.push({});
  sets[+si]={...sets[+si],[f]:inp.value};
  exs[+ei]={done:es.done,sets};
  S.completions={...S.completions,[key]:{...c,exercises:exs}};
  save();
  // update .fi class on parent set-card
  const sc=inp.closest('.scard');
  if(sc){
    const wt=sc.querySelector('[data-f="weight"]');
    const rp=sc.querySelector('[data-f="reps"]');
    const hasVal=(wt&&wt.value)||(rp&&rp.value);
    sc.classList.toggle('fi',!!hasVal);
  }
});

// focus select-all for quick overwrite
document.addEventListener('focus',e=>{
  if(e.target.classList.contains('sinp'))e.target.select();
},true);

// =========================================================
// TODAY VIEW
// =========================================================
function mkToday(){
  const div=document.createElement('div');div.className='today-view fade';
  const today=todayDayKey();

  // Date label
  const dl=document.createElement('div');
  dl.style.cssText='padding:1rem 1.25rem .25rem;font-size:.625rem;letter-spacing:.25em;text-transform:uppercase;color:var(--t3);font-family:JetBrains Mono,monospace';
  dl.textContent=fmtLong();

  // Card
  const cw=document.createElement('div');cw.style.cssText='padding:0 1.25rem';
  cw.appendChild(mkCard(today,S.week,true));

  // Week strip
  const sw=document.createElement('div');sw.className='swrap';
  sw.innerHTML='<div class="slbl mf">THIS WEEK</div>';
  const strip=document.createElement('div');strip.className='strip';
  DAYS.forEach(d=>{
    const aid=(S.overrides&&S.overrides['w'+S.week+'-'+d])||SCHED[S.week].d[d];const m=ACT[aid];
    const done=S.completions['w'+S.week+'-'+d]?.done;
    const isTod=d===today;
    const day=document.createElement('div');day.className='sday';
    day.innerHTML=`<span class="sd mf">${DAY_SHORT[d]}</span>
      <div class="sdot${isTod?' tod':''}" style="background:${done?m.color:m.tint};border-color:${done?'transparent':m.border}">
        ${done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
      </div>`;
    strip.appendChild(day);
  });
  sw.appendChild(strip);

  // Rule
  const rw=document.createElement('div');rw.className='rwrap';
  rw.innerHTML=`<div class="rcard">
    <div class="rq sf">"Never miss <span class="ac">twice.</span>"</div>
    <div class="rs">Miss a day, fine. The next session is non-negotiable.</div>
  </div>`;

  div.append(dl,cw,sw,rw);
  return div;
}

// =========================================================
// WEEK VIEW
// =========================================================
function mkWeek(){
  const div=document.createElement('div');div.className='wview fade';
  const today=todayDayKey();
  DAYS.forEach(d=>{
    div.appendChild(mkCard(d,S.week,d===today));
  });
  return div;
}

// =========================================================
// PROGRESS VIEW
// =========================================================
function mkProgress(){
  const div=document.createElement('div');div.className='pgview fade';

  // Stats
  const allDone=Object.entries(S.completions).filter(([,c])=>c.done);
  const total=allDone.length;

  // Streak
  let streak=0;
  for(let i=0;i<90;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    if(Object.values(S.completions).some(c=>c.completedAt===iso&&c.done))streak++;
    else if(i>0)break;
  }

  // By type
  const byType={};
  allDone.forEach(([k])=>{
    const[wk,dy]=k.split('-');
    const w=parseInt(wk.slice(1));
    const aid=SCHED[w]?.d[dy];
    if(aid){const t=aid.startsWith('gym')?'gym':aid;byType[t]=(byType[t]||0)+1;}
  });

  // Stat cards
  const sg=document.createElement('div');sg.className='sgrid2';
  sg.innerHTML=`
    <div class="sc">
      <div class="slb mf">Total</div>
      <div class="sv sf">${total}</div>
      <div class="ss">sessions done</div>
    </div>
    <div class="sc ac">
      <div class="slb ac mf">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        Streak
      </div>
      <div class="sv sf">${streak}</div>
      <div class="ss">day${streak!==1?'s':''}</div>
    </div>`;
  div.appendChild(sg);

  // Activity bars
  div.innerHTML+=`<div class="seclbl mf">By activity</div>`;
  const abcard=document.createElement('div');abcard.className='abcard';
  const acts=[
    {k:'gym',l:'Gym',c:'#fb923c'},{k:'run',l:'Run',c:'#60a5fa'},
    {k:'yoga',l:'Yoga',c:'#a3e635'},{k:'golf',l:'Golf',c:'#c084fc'},{k:'swim',l:'Swim',c:'#22d3ee'}
  ];
  const maxN=Math.max(...acts.map(a=>byType[a.k]||0),1);
  acts.forEach(a=>{
    const n=byType[a.k]||0;
    const row=document.createElement('div');row.className='abrow';
    row.innerHTML=`<span class="ablbl">${a.l}</span>
      <div class="abtr"><div class="abfi" style="background:${a.c};width:${(n/maxN*100).toFixed(1)}%"></div></div>
      <span class="abn mf">${n}</span>`;
    abcard.appendChild(row);
  });
  div.appendChild(abcard);

  // Week map
  const wmEl=document.createElement('div');
  wmEl.innerHTML='<div class="seclbl mf">12-WEEK MAP</div>';
  const wmcard=document.createElement('div');wmcard.className='wmcard';
  const wmap=document.createElement('div');wmap.className='wmap';
  for(let w=1;w<=12;w++){
    const schd=SCHED[w].d;
    const total2=DAYS.filter(d=>(S.overrides&&S.overrides['w'+w+'-'+d]?S.overrides['w'+w+'-'+d]:schd[d])!=='rest').length;
    const done2=DAYS.filter(d=>{const a=(S.overrides&&S.overrides['w'+w+'-'+d])||schd[d];return a!=='rest'&&S.completions['w'+w+'-'+d]?.done;}).length;
    const pct=total2?done2/total2:0;
    const cell=document.createElement('button');
    cell.className='wcel'+(w===S.week?' cur':'');
    cell.innerHTML=`<div class="wctp"><span class="wcwk mf">W${String(w).padStart(2,'0')}</span><span class="wcph mf">P${SCHED[w].ph}</span></div>
      <div class="wcct sf">${done2}<span class="dm">/${total2}</span></div>
      <div class="wcbar"><div class="wcbf" style="width:${(pct*100).toFixed(0)}%"></div></div>`;
    cell.onclick=()=>{S.week=w;save();render();};
    wmap.appendChild(cell);
  }
  wmcard.appendChild(wmap);wmEl.appendChild(wmcard);div.appendChild(wmEl);

  // Phases
  div.innerHTML+='<div class="seclbl mf" style="margin-top:1.25rem">PHASES</div>';
  const curPh=SCHED[S.week].ph;
  [1,2,3].forEach(p=>{
    const pi=PHASES[p];
    const phc=document.createElement('div');phc.className='phcard'+(p===curPh?' cur':'');
    phc.innerHTML=`<div class="phctp">
      <span class="phnm sf">${pi.name}${p===curPh?' <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287Z"/></svg>':''}</span>
      <span class="phrg mf">${pi.range}</span>
    </div>
    <div class="phds">${pi.desc}</div>`;
    div.appendChild(phc);
  });

  // History
  div.innerHTML+='<div class="seclbl mf" style="margin-top:1.25rem">HISTORY FROM PT SHEET</div>';
  const hcard=document.createElement('div');hcard.className='hcard';
  [...HIST].reverse().forEach(h=>{
    const row=document.createElement('div');row.className='hrow';
    row.innerHTML=`<span class="hsess">${GYM[h.sess]?.name||h.sess}</span>
      <span class="hdate mf">${fmtDate(h.date)}<span class="hloc"> ${h.loc}</span></span>`;
    hcard.appendChild(row);
  });
  div.appendChild(hcard);

  // ---- Apple Health Import ----
  const rst=document.createElement('button');rst.className='rstbtn mf';rst.textContent='Reset all progress';
  rst.onclick=()=>{if(confirm('Reset all completions? Cannot be undone.')){S.completions={};save();render();}};
  div.appendChild(rst);

  return div;
}

// =========================================================
// INSTALL HINT (shown only when not in standalone)
// =========================================================
function maybeShowInstall(){
  if(window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches)return;
  const hint=document.createElement('div');hint.className='ihint';
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid=/android/i.test(navigator.userAgent);
  if(isIOS)
    hint.innerHTML='<b>Add to Home Screen</b> for offline gym use:<br>Tap the Share icon → "Add to Home Screen"';
  else if(isAndroid)
    hint.innerHTML='<b>Install as app</b> for offline gym use:<br>Tap the menu → "Add to Home screen" or "Install app"';
  else
    hint.innerHTML='<b>Save this file</b> — it works completely offline once saved to your phone.';
  document.getElementById('app').appendChild(hint);
}

// =========================================================
// INIT
// =========================================================
render();
setTimeout(maybeShowInstall,500);
