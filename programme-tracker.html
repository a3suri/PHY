<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="data:application/manifest+json,{\"name\":\"Programme\",\"short_name\":\"PRGM\",\"display\":\"standalone\",\"background_color\":\"#0a0a0a\",\"theme_color\":\"#0a0a0a\",\"start_url\":\".\"}"><meta name="apple-mobile-web-app-title" content="Programme">
<meta name="theme-color" content="#0a0a0a">
<title>Programme · A Suri</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:rgba(23,23,23,.85);--s2:rgba(23,23,23,.4);
  --b1:#262626;--b2:rgba(38,38,38,.6);
  --t1:#fafaf9;--t2:#a3a3a3;--t3:#737373;--t4:#525252;--t5:#3d3d3d;
  --ac:#fb923c;
}
html,body{background:var(--bg);color:var(--t1)}
body{font-family:'Outfit',-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;font-size:16px;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
input,button{font-family:inherit;font-size:16px;color:inherit}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.sf{font-family:'Fraunces',Georgia,serif}
.mf{font-family:'JetBrains Mono',monospace}
#grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E")}
#app{max-width:28rem;margin:0 auto;position:relative;z-index:1}
/* Header */
.hdr{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid #171717}
.hdr-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.25rem}
.lxs{font-size:.625rem;letter-spacing:.3em;color:var(--t3);text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.wtitle{font-family:'Fraunces',Georgia,serif;font-size:3rem;line-height:1;font-weight:500}
.wnum{font-style:italic;color:var(--ac);margin-left:.5rem}
.prow{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
.plbl{font-size:.625rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);font-family:'JetBrains Mono',monospace}
.nbts{display:flex;gap:.25rem}
.nbt{width:2rem;height:2rem;border-radius:50%;border:1px solid var(--b1);background:transparent;color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s}
.nbt:active{transform:scale(.93)}
.nbt:disabled{opacity:.3;cursor:not-allowed}
/* Tabs */
.tabwrap{padding:1rem 1.25rem .5rem;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid rgba(23,23,23,.5)}
.tabs{display:flex;gap:.25rem;background:rgba(23,23,23,.6);border:1px solid rgba(38,38,38,.6);border-radius:999px;padding:.25rem}
.tab{flex:1;padding:.5rem 0;font-size:.75rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;background:transparent;border:none;color:var(--t2);border-radius:999px;cursor:pointer;transition:all .15s}
.tab.on{background:var(--t1);color:var(--bg);box-shadow:0 10px 25px -10px rgba(255,255,255,.2)}
/* Cards */
.card{border-radius:1rem;border:1px solid var(--b1);background:var(--s1);overflow:hidden;position:relative;transition:all .2s}
.card.tod{border-color:rgba(251,146,60,.4);box-shadow:0 0 30px -10px rgba(251,146,60,.3)}
.card.tod::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent)}
.card.dn{background:rgba(23,23,23,.35)}
.chdr{width:100%;padding:1rem;display:flex;align-items:flex-start;gap:.75rem;text-align:left;background:transparent;border:none;color:inherit;cursor:pointer}
.chdr:active{background:rgba(23,23,23,.4)}
.icwrap{width:2.5rem;height:2.5rem;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.125rem}
.cbody{flex:1;min-width:0}
.cmr{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem}
.cdlbl{font-size:.625rem;letter-spacing:.2em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:var(--t3)}
.todtag{color:var(--ac);margin-left:.375rem}
.chev{color:var(--t3);transition:transform .2s;flex-shrink:0}
.chev.op{transform:rotate(180deg)}
.cname{font-family:'Fraunces',Georgia,serif;font-size:1.25rem;line-height:1.2;color:var(--t1);margin-top:.125rem;font-weight:500}
.cfoc{font-size:.875rem;color:var(--t2);margin-top:.125rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Expand */
.cexp{padding:0 1rem .75rem}
.cein{border-top:1px solid var(--b2);padding-top:.5rem}
/* Gym exercise row */
.exrow{padding:.625rem 0;border-bottom:1px solid rgba(38,38,38,.4)}
.exrow:last-child{border-bottom:none}
.exhdr{display:flex;align-items:center;gap:.625rem;margin-bottom:.5rem}
.exnm{font-size:.875rem;line-height:1.2;flex:1;min-width:0;color:var(--t1)}
.exnm.dn{color:var(--t3)}
.exmt{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:var(--t3);white-space:nowrap}
.exrs{color:var(--t4);margin-left:.375rem}
/* Checkbox */
.ck{width:1.25rem;height:1.25rem;border-radius:.375rem;border:2px solid #3d3d3d;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:transparent;padding:0;transition:transform .1s}
.ck:active{transform:scale(.88)}
.ck.on{border-color:transparent}
/* Sets */
.sgrid{display:grid;gap:.375rem}
.scard{border-radius:.5rem;border:1px solid rgba(38,38,38,.6);background:rgba(23,23,23,.3);padding:.375rem;transition:all .15s}
.scard.fi{background:rgba(23,23,23,.8);border-color:#3d3d3d}
.snum{font-size:.5rem;font-family:'JetBrains Mono',monospace;color:var(--t3);letter-spacing:.15em;text-align:center;margin-bottom:.125rem}
.sinp{width:100%;background:transparent;text-align:center;font-family:'JetBrains Mono',monospace;outline:none;border:none;padding:.125rem .25rem;border-radius:.25rem;font-size:1rem}
.sinp.wt{color:var(--t1)}
.sinp.rp{color:var(--t2)}
.sinp:focus{background:rgba(38,38,38,.5)}
.sinp::placeholder{color:#3a3a3a}
.sunt{font-size:.5rem;font-family:'JetBrains Mono',monospace;color:var(--t4);text-align:center;margin-top:-0.125rem;margin-bottom:.125rem}
/* Prev hint */
.pvhint{display:flex;align-items:center;gap:.5rem;margin-top:.375rem;padding:0 .25rem}
.pvtxt{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:var(--t3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pvset{color:var(--t2)}
.delta{font-size:.625rem;font-family:'JetBrains Mono',monospace;padding:.125rem .375rem;border-radius:999px;white-space:nowrap}
/* Non-gym items */
.irow{width:100%;display:flex;align-items:center;gap:.75rem;padding:.5rem;margin:0 -.5rem;border-radius:.5rem;background:transparent;border:none;color:inherit;cursor:pointer;text-align:left}
.irow:active{background:rgba(38,38,38,.4)}
.inm{font-size:.875rem;flex:1;min-width:0;color:var(--t1)}
.inm.dn{text-decoration:line-through;color:var(--t4)}
.imt{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:var(--t3)}
/* Complete button */
.carea{padding:0 1rem 1rem}
.cbtn{width:100%;padding:.75rem;border-radius:.75rem;font-weight:500;font-size:.875rem;letter-spacing:.05em;border:none;cursor:pointer;transition:transform .1s;color:var(--bg)}
.cbtn:active{transform:scale(.97)}
.cbtn.dn{background:rgba(38,38,38,.6)!important;color:var(--t2);border:1px solid #3d3d3d}
/* Week strip */
.swrap{padding:1rem 1.25rem 0}
.slbl{font-size:.625rem;letter-spacing:.25em;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:.625rem}
.strip{display:grid;grid-template-columns:repeat(7,1fr);gap:.375rem}
.sday{display:flex;flex-direction:column;align-items:center;gap:.375rem}
.sd{font-size:.5625rem;font-family:'JetBrains Mono',monospace;color:var(--t4)}
.sdot{width:100%;aspect-ratio:1;border-radius:.5rem;display:flex;align-items:center;justify-content:center;border:1px solid transparent}
.sdot.tod{box-shadow:0 0 0 1px rgba(251,146,60,.5)}
/* Rule */
.rwrap{padding:1.5rem 1.25rem}
.rcard{border-radius:.75rem;border:1px solid var(--b1);background:rgba(23,23,23,.4);padding:1rem}
.rq{font-family:'Fraunces',Georgia,serif;font-size:1.5rem;font-style:italic;line-height:1.2}
.rq .ac{color:var(--ac)}
.rs{font-size:.75rem;color:var(--t3);margin-top:.5rem;line-height:1.4}
/* Week view */
.wview{padding:1rem 1.25rem 1.5rem}
.wview>*+*{margin-top:.625rem}
/* Progress */
.pgview{padding:1rem 1.25rem 1.5rem}
.sgrid2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.sc{border-radius:1rem;border:1px solid var(--b1);background:rgba(23,23,23,.6);padding:1rem}
.sc.ac{border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.05)}
.slb{font-size:.625rem;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace}
.slb.ac{color:var(--ac)}
.sv{font-family:'Fraunces',Georgia,serif;font-size:3rem;line-height:1;font-weight:500;margin-top:.25rem}
.ss{font-size:.75rem;color:var(--t3);margin-top:.25rem}
.seclbl{font-size:.625rem;letter-spacing:.25em;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:.625rem}
/* Activity bars */
.abcard{border-radius:1rem;border:1px solid var(--b1);background:rgba(23,23,23,.4);padding:1rem;margin-bottom:1.25rem}
.abrow{display:flex;align-items:center;gap:.75rem}
.abrow+.abrow{margin-top:.625rem}
.ablbl{width:3.5rem;font-size:.75rem;color:var(--t1)}
.abtr{flex:1;height:.5rem;background:rgba(38,38,38,.6);border-radius:999px;overflow:hidden}
.abfi{height:100%;border-radius:999px;transition:width .5s}
.abn{width:1.5rem;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--t2)}
/* Week map */
.wmcard{border-radius:1rem;border:1px solid var(--b1);background:rgba(23,23,23,.4);padding:1rem;margin-bottom:1.25rem}
.wmap{display:grid;grid-template-columns:repeat(4,1fr);gap:.375rem}
.wcel{border-radius:.5rem;border:1px solid var(--b1);background:rgba(23,23,23,.4);padding:.5rem;cursor:pointer;transition:transform .1s;text-align:left}
.wcel:active{transform:scale(.94)}
.wcel.cur{border-color:var(--ac);background:rgba(251,146,60,.1)}
.wctp{display:flex;align-items:baseline;justify-content:space-between}
.wcwk{font-size:.5625rem;font-family:'JetBrains Mono',monospace;color:var(--t3)}
.wcph{font-size:.5rem;font-family:'JetBrains Mono',monospace;color:var(--t4)}
.wcct{font-family:'Fraunces',Georgia,serif;font-size:1.125rem;line-height:1;margin-top:.25rem;font-weight:500}
.wcct .dm{color:var(--t4);font-size:.875rem}
.wcbar{height:2px;background:#262626;border-radius:999px;overflow:hidden;margin-top:.375rem}
.wcbf{height:100%;background:var(--ac);transition:width .5s}
/* Phase cards */
.phcard{border-radius:.75rem;border:1px solid var(--b1);background:rgba(23,23,23,.3);padding:.75rem}
.phcard+.phcard{margin-top:.5rem}
.phcard.cur{border-color:rgba(251,146,60,.4);background:rgba(251,146,60,.05)}
.phctp{display:flex;align-items:baseline;justify-content:space-between}
.phnm{font-family:'Fraunces',Georgia,serif;font-size:1.125rem;color:var(--t1);font-weight:500}
.phrg{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:var(--t3)}
.phds{font-size:.75rem;color:var(--t3);margin-top:.125rem}
/* History */
.hcard{border-radius:1rem;border:1px solid var(--b1);background:rgba(23,23,23,.4);padding:1rem;margin-bottom:1.25rem}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--b2)}
.hrow:last-child{border-bottom:none}
.hdate{font-family:'JetBrains Mono',monospace;font-size:.6875rem;color:var(--t2)}
.hsess{font-size:.75rem;color:var(--t1)}
.hloc{font-family:'JetBrains Mono',monospace;font-size:.5625rem;color:var(--t4);letter-spacing:.1em}
/* Install hint */
.ihint{margin:1rem 1.25rem 2rem;padding:.75rem;border:1px dashed #262626;border-radius:.5rem;font-size:.6875rem;color:var(--t3);text-align:center;line-height:1.5}
.ihint b{color:var(--ac);font-weight:600}
/* Reset */
.rstbtn{width:100%;padding:.5rem 0;margin-top:1.5rem;font-size:.625rem;letter-spacing:.2em;text-transform:uppercase;color:var(--t4);background:transparent;border:none;font-family:'JetBrains Mono',monospace;cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .35s ease-out}
.rest-msg{padding:0 1rem 1rem;text-align:center;font-size:.875rem;color:var(--t3);font-style:italic}

/* removed */
.himp-card{border:1px dashed rgba(34,211,238,.35);background:rgba(34,211,238,.04);border-radius:1rem;padding:1rem}
.himp-title{font-size:.875rem;color:var(--t1);font-weight:500;margin-bottom:.3rem}
.himp-steps{font-size:.6875rem;color:#22d3ee;font-weight:500;margin-bottom:.25rem}
.himp-sub{font-size:.75rem;color:var(--t3);margin-bottom:.75rem;line-height:1.6}
.himp-sub b{color:var(--t2);font-weight:500}
.himp-btn{width:100%;padding:.625rem;border-radius:.75rem;font-size:.8125rem;font-weight:500;cursor:pointer;transition:transform .1s;border:none;letter-spacing:.02em}
.himp-btn:active{transform:scale(.97)}
.hst-row{display:flex;align-items:baseline;justify-content:space-between;padding:.375rem 0;border-bottom:1px solid var(--b2)}
.hst-row:last-child{border-bottom:none}
.hst-date{font-family:'JetBrains Mono',monospace;font-size:.625rem;color:var(--t3)}
.hst-info{font-size:.75rem;color:var(--t1)}
.hst-cal{font-family:'JetBrains Mono',monospace;font-size:.625rem;color:var(--t4)}
.parsing-msg{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#22d3ee;letter-spacing:.1em}
@keyframes spin{to{transform:rotate(360deg)}}

.swap-bar{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.625rem 1rem;border:none;border-top:1px solid rgba(38,38,38,.5);
  background:transparent;cursor:pointer;color:#737373;
  font-size:.6875rem;letter-spacing:.1em;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;transition:background .15s}
.swap-bar:active{background:rgba(38,38,38,.4)}
.swap-bar svg{flex-shrink:0}
.swap-bar.open{color:var(--ac);border-bottom:1px solid rgba(38,38,38,.4)}
.custom-tag{font-size:.5rem;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--ac);background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.3);border-radius:999px;padding:.1rem .35rem;margin-left:.375rem;vertical-align:middle}
.act-picker{padding:.75rem 1rem;display:flex;gap:.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:wrap}
.act-picker::-webkit-scrollbar{display:none}
.act-pill{display:flex;align-items:center;gap:.4rem;padding:.5rem .875rem;border-radius:999px;border:1px solid transparent;font-size:.8125rem;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;background:transparent;transition:transform .1s;min-height:2.5rem}
.act-pill:active{transform:scale(.93)}
.log-sect{border-top:1px solid rgba(38,38,38,.4);padding:.75rem .25rem .25rem;margin-top:.25rem}
.log-lbl{font-size:.5rem;font-family:'JetBrains Mono',monospace;color:#525252;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.625rem}
.log-row{display:flex;align-items:center;gap:.625rem;margin-bottom:.5rem}
.log-key{font-size:.75rem;color:#a3a3a3;width:7rem;flex-shrink:0}
.log-val{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:#525252;flex-shrink:0}
.log-inp{flex:1;background:rgba(23,23,23,.7);border:1px solid #3d3d3d;border-radius:.5rem;padding:.35rem .625rem;font-family:'JetBrains Mono',monospace;font-size:.9375rem;color:var(--t1);outline:none}
.log-inp:focus{border-color:rgba(251,146,60,.4);background:rgba(38,38,38,.5)}
.log-inp::placeholder{color:#3a3a3a}
.log-textarea{width:100%;background:rgba(23,23,23,.7);border:1px solid #3d3d3d;border-radius:.5rem;padding:.35rem .625rem;font-family:'Outfit',sans-serif;font-size:.875rem;color:var(--t1);outline:none;resize:none;line-height:1.4}
.log-textarea:focus{border-color:rgba(251,146,60,.4)}
.log-textarea::placeholder{color:#3a3a3a}
.actual-wrap{display:flex;align-items:center;gap:.375rem;margin-left:auto}
.actual-lbl{font-size:.5rem;font-family:'JetBrains Mono',monospace;color:#525252;letter-spacing:.1em;white-space:nowrap}
.actual-inp{width:4rem;background:rgba(23,23,23,.7);border:1px solid #3d3d3d;border-radius:.375rem;padding:.2rem .375rem;font-family:'JetBrains Mono',monospace;font-size:.875rem;color:var(--t1);outline:none;text-align:center}
.actual-inp:focus{border-color:rgba(251,146,60,.4)}
.actual-inp::placeholder{color:#3a3a3a}

.date-row{display:flex;align-items:center;justify-content:space-between;padding:.625rem 1rem;border-top:1px solid rgba(38,38,38,.4)}
.date-lbl{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:#737373;letter-spacing:.15em;text-transform:uppercase}
.date-inp{background:rgba(23,23,23,.7);border:1px solid #3d3d3d;border-radius:.5rem;padding:.35rem .625rem;font-family:'JetBrains Mono',monospace;font-size:.875rem;color:var(--t1);outline:none;-webkit-appearance:none}
.date-inp:focus{border-color:rgba(251,146,60,.4)}
.add-sess-btn{width:100%;padding:.75rem;border:1px dashed #3d3d3d;border-radius:.75rem;background:transparent;color:#737373;font-size:.6875rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:.5rem;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;gap:.5rem}
.add-sess-btn:active{background:rgba(38,38,38,.4);color:var(--t1)}
.extra-wrap{margin-top:.5rem;border-radius:1rem;border:1px solid #3d3d3d;background:rgba(23,23,23,.5);overflow:hidden;position:relative}
.extra-wrap.done{background:rgba(23,23,23,.3)}
.extra-top{display:flex;align-items:center;gap:.625rem;padding:.75rem 1rem}
.extra-icon{font-size:1rem;line-height:1;flex-shrink:0}
.extra-info{flex:1;min-width:0}
.extra-name{font-size:.875rem;color:var(--t1);font-family:'Fraunces',Georgia,serif;font-weight:500}
.extra-date-disp{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:#737373;margin-top:.1rem}
.extra-del{background:transparent;border:none;color:#525252;cursor:pointer;padding:.25rem .5rem;font-size:1.125rem;line-height:1;flex-shrink:0}
.extra-del:active{color:#ef4444}
.extra-chev{color:#525252;transition:transform .2s;flex-shrink:0}
.extra-chev.op{transform:rotate(180deg)}

.sunsal-row{padding:.75rem 0 .5rem;border-bottom:1px solid rgba(38,38,38,.4)}
.sunsal-hdr{display:flex;align-items:center;gap:.625rem;margin-bottom:.625rem}
.sunsal-title{font-size:.875rem;color:var(--t1);flex:1}
.sunsal-target{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:#737373}
.sunsal-inp-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.625rem}
.sunsal-inp-lbl{font-size:.6875rem;color:#a3a3a3;width:7rem;flex-shrink:0}
.sunsal-inp{width:5rem;background:rgba(23,23,23,.7);border:1px solid #3d3d3d;border-radius:.5rem;padding:.4rem .625rem;font-family:'JetBrains Mono',monospace;font-size:1.125rem;color:var(--t1);outline:none;text-align:center}
.sunsal-inp:focus{border-color:rgba(163,230,53,.5)}
.sunsal-inp::placeholder{color:#3a3a3a}
.sunsal-prog-wrap{margin-top:.25rem}
.sunsal-prog-lbl{display:flex;justify-content:space-between;margin-bottom:.375rem}
.sunsal-prog-txt{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:#737373}
.sunsal-prog-pct{font-size:.625rem;font-family:'JetBrains Mono',monospace;color:#a3e635}

const BASE_KEY='prgm-v2';
const USERS_KEY='prgm-users';
function slugify(n){return n.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');}
function userKey(n){return n?BASE_KEY+'-'+slugify(n):BASE_KEY;}
function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||[];}catch{return[];}}
function saveUsers(u){try{localStorage.setItem(USERS_KEY,JSON.stringify(u));}catch{}}
function defState(){return{week:0,tab:'today',expanded:todayDayKey(),completions:{},overrides:{},swapping:null,extras:[],steps:{},measurements:{},targets:{weight:'',bodyFat:'',waist:'',chest:'',hips:'',thigh:'',arm:'',runDist:5,golfHcp:'',totalLift:''},_measWeek:undefined,userName:'',editingName:false};}
let S=defState();
// Load: check for a remembered current user, otherwise try legacy key
(function(){
  try{
    const cu=localStorage.getItem('prgm-current-user');
    if(cu){
      const r=localStorage.getItem(userKey(cu));
      if(r){S=Object.assign(defState(),JSON.parse(r));return;}
    }
    // Legacy migration: old data under BASE_KEY with no userName
    const old=localStorage.getItem(BASE_KEY);
    if(old){
      const parsed=JSON.parse(old);
      if(parsed&&!parsed.userName){S=Object.assign(defState(),parsed);}
    }
  }catch(e){}
  // Auto-correct week
  try{
    const today=new Date();today.setHours(0,0,0,0);
    const wk1=new Date('2026-05-18T00:00:00');
    if(today<wk1&&S.week>=1)S.week=0;
  }catch(e){}
})();

  clearTimeout(_st);
  _st=setTimeout(()=>{try{const k=S.userName?userKey(S.userName):BASE_KEY;localStorage.setItem(k,JSON.stringify(S));if(S.userName)localStorage.setItem('prgm-current-user',S.userName);}catch(e){}},350);
}

function todayDayKey(){return DAY_JS[new Date().getDay()];}
function isoToday(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){const d=new Date(iso);return d.getDate()+' '+MONTHS[d.getMonth()];}
function fmtLong(){return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}

function getDetail(aid,week){
  const m=ACT[aid];if(!m)return null;
  if(aid.startsWith('gym')){const g=GYM[aid];return{...m,name:g.name,focus:g.focus,items:g.ex,isGym:true};}
  if(aid==='run') return{...m,name:'Run Intervals',focus:RUN[week],items:null};
  if(aid==='yoga')return{...m,name:'Yoga / Mobility',focus:'40–45 min flow',items:YOGA};
  if(aid==='swim')return{...m,name:'Swim',focus:'25–30 min',items:SWIM};
  if(aid==='golf')return{...m,name:'Golf',focus:'Walk the course',items:GOLF};
  if(aid==='run-yoga')return{...m,name:'Run + Yoga',focus:(RUN[week]||'Run intervals')+' · then Yoga flow',items:YOGA,isRunYoga:true};
  if(aid==='walk')return{...m,name:'Walk',focus:'Steps · Distance · Duration',items:null};
  return{...m,name:'Rest Day',focus:'Recovery — optional 20 min walk',items:null};
}

function exState(comp,idx){
  const e=comp?.exercises?.[idx];
  if(!e&&e!==0)return{done:false,sets:[]};
  if(typeof e==='boolean')return{done:e,sets:[]};
  return{done:!!e.done,sets:e.sets||[]};
}

function isBW(ex){return ex.bw||/Plank|Dead Bug|Push.?up|Lunge|Crunch/i.test(ex.n);}

function findPrev(exName,curWeek,curDay){
  // Check user logs (backward from current)
  const curDi=DAYS.indexOf(curDay);
  for(let w=curWeek;w>=1;w--){
    const maxDi=(w===curWeek)?curDi-1:DAYS.length-1;
    for(let di=maxDi;di>=0;di--){
      const d=DAYS[di];
      const c=S.completions['w'+w+'-'+d];
      if(!c?.exercises)continue;
      const aid=getSchedule(w)?.d[d];
      if(!aid?.startsWith('gym'))continue;
      const g=GYM[aid];if(!g)continue;
      const ei=g.ex.findIndex(e=>e.n===exName);
      if(ei<0)continue;
      const es=exState(c,ei);
      if(es.sets.some(s=>s?.weight||s?.reps))
        return{sets:es.sets,label:'Wk '+w,source:'log'};
    }
  }
  // Check HIST
  let best=null,bestD=null;
  for(const h of HIST){
    if(!h.ex[exName])continue;
    const d=new Date(h.date);
    if(!bestD||d>bestD){
      bestD=d;
      best={
        sets:h.ex[exName].map(s=>({weight:s.w||'',reps:s.r||''})),
        label:fmtDate(h.date)+(h.loc?' · '+h.loc:''),
        source:'hist'
      };
    }
  }
  return best;
}

const WK0_START='2026-05-13';
const WK1_START='2026-05-18';

function weekStartDate(w){
  if(w===0)return new Date(WK0_START+'T00:00:00');
  const d=new Date(WK1_START+'T00:00:00');
  d.setDate(d.getDate()+(w-1)*7);return d;
}
function weekEndDate(w){
  if(w===0)return new Date('2026-05-17T00:00:00');
  const d=weekStartDate(w);d.setDate(d.getDate()+6);return d;
}
function isWeekFuture(w){
  const ws=weekStartDate(w);
  const today=new Date();today.setHours(0,0,0,0);ws.setHours(0,0,0,0);
  return ws>today;
}
function fmtWeekRange(w){
  const s=weekStartDate(w),e=weekEndDate(w);
  const sm=MONTHS[s.getMonth()],em=MONTHS[e.getMonth()];
  return s.getDate()+(sm!==em?' '+sm:'')+' – '+e.getDate()+' '+em;
}
function getExpectedDate(week,day){
  const ws=weekStartDate(week);
  ws.setDate(ws.getDate()+DAYS.indexOf(day));
  return ws.toISOString().slice(0,10);
}

function countSunSals(){
  let total=0;
  // From main completions — only yoga keys (activity is yoga or companion '-yoga' key)
  Object.entries(S.completions).forEach(([key,c])=>{
    if(!c?.exercises?.[0]?.actual)return;
    // Accept keys ending in '-yoga' (companion) or where the scheduled/overridden activity is yoga
    const isYogaKey=key.endsWith('-yoga');
    if(!isYogaKey){
      // Check if this slot is actually a yoga day
      const parts=key.split('-'); // ['w1','mon']
      const w=parseInt(parts[0].slice(1));const d=parts[1];
      const aid=(S.overrides&&S.overrides[key])||getSchedule(w)?.d[d];
      if(aid!=='yoga')return;
    }
    const n=parseInt(c.exercises[0].actual);
    if(!isNaN(n))total+=n;
  });
  // From extras (yoga type only)
  (S.extras||[]).forEach(e=>{
    if((e.activityId==='yoga'||e.activityId==='run-yoga')&&e.exercises?.[0]?.actual){
      const n=parseInt(e.exercises[0].actual);
      if(!isNaN(n))total+=n;
    }
  });
  return total;
}

// ── Total weight lifted calculation ──────────────────────────────────────────
function calcWeeklyLift(week){
  let total=0;
  DAYS.forEach(d=>{
    const key='w'+week+'-'+d;
    const c=S.completions[key];
    if(!c?.exercises)return;
    const aid=(S.overrides&&S.overrides[key])||getSchedule(week)?.d[d];
    if(!aid?.startsWith('gym'))return;
    const g=GYM[aid];if(!g)return;
    g.ex.forEach((ex,ei)=>{
      const es=exState(c,ei);
      es.sets.forEach(s=>{
        const w=parseFloat(s?.weight),r=parseFloat(s?.reps);
        if(!isNaN(w)&&!isNaN(r)&&w>0&&r>0)total+=w*r;
      });
    });
  });
  (S.extras||[]).filter(e=>e.week===week&&e.activityId?.startsWith('gym')).forEach(e=>{
    const g=GYM[e.activityId];if(!g)return;
    g.ex.forEach((ex,ei)=>{
      const es=exState({exercises:e.exercises||{}},ei);
      es.sets.forEach(s=>{
        const w=parseFloat(s?.weight),r=parseFloat(s?.reps);
        if(!isNaN(w)&&!isNaN(r)&&w>0&&r>0)total+=w*r;
      });
    });
  });
  return total>0?Math.round(total):null;
}

// ── SVG line chart ────────────────────────────────────────────────────────────
function mkLineChart(points,opts={}){
  const{color='#fb923c',unit='',target,label=''}=opts;
  const filled=points.filter(p=>p.v!==''&&p.v!==null&&p.v!==undefined&&!isNaN(parseFloat(p.v)));
  if(filled.length<1){
    const empty=document.createElement('div');empty.className='chart-empty';
    empty.textContent='No data logged yet';return empty;
  }
  const vals=filled.map(p=>parseFloat(p.v));
  const tgtVal=target?parseFloat(target):null;
  const allVals=tgtVal?[...vals,tgtVal]:vals;
  const minV=Math.min(...allVals);const maxV=Math.max(...allVals);
  const pad2=Math.max((maxV-minV)*0.12,0.5);
  const lo=minV-pad2,hi=maxV+pad2,range=hi-lo||1;
  const W=320,H=90,pL=36,pR=8,pT=8,pB=22;
  const iW=W-pL-pR,iH=H-pT-pB;
  const xOf=i=>pL+(i/(Math.max(filled.length-1,1)))*iW;
  const yOf=v=>pT+iH-((v-lo)/range)*iH;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.cssText='width:100%;height:75px;overflow:visible;display:block';
  // Grid lines + y labels
  [0,1,2,3].forEach(i=>{
    const y=pT+(i*iH/3);
    const gl=document.createElementNS(ns,'line');
    gl.setAttribute('x1',pL);gl.setAttribute('x2',pL+iW);
    gl.setAttribute('y1',y);gl.setAttribute('y2',y);
    gl.setAttribute('stroke','#262626');gl.setAttribute('stroke-width','0.5');
    svg.appendChild(gl);
    const v=hi-(i*(hi-lo)/3);
    const txt=document.createElementNS(ns,'text');
    txt.setAttribute('x',pL-3);txt.setAttribute('y',y+3);
    txt.setAttribute('text-anchor','end');txt.setAttribute('font-size','6.5');
    txt.setAttribute('fill','#525252');txt.setAttribute('font-family','JetBrains Mono,monospace');
    txt.textContent=v>=1000?Math.round(v/100)/10+'k':v.toFixed(v<10?1:0);
    svg.appendChild(txt);
  });
  // Target line
  if(tgtVal!==null&&!isNaN(tgtVal)){
    const ty=yOf(tgtVal);
    const tl=document.createElementNS(ns,'line');
    tl.setAttribute('x1',pL);tl.setAttribute('x2',pL+iW);
    tl.setAttribute('y1',ty);tl.setAttribute('y2',ty);
    tl.setAttribute('stroke',color);tl.setAttribute('stroke-width','1');
    tl.setAttribute('stroke-dasharray','4,3');tl.setAttribute('opacity','0.4');
    svg.appendChild(tl);
    const tlbl=document.createElementNS(ns,'text');
    tlbl.setAttribute('x',pL+iW+2);tlbl.setAttribute('y',ty+3);
    tlbl.setAttribute('font-size','6');tlbl.setAttribute('fill',color);
    tlbl.setAttribute('font-family','JetBrains Mono,monospace');tlbl.setAttribute('opacity','0.7');
    tlbl.textContent='TGT';svg.appendChild(tlbl);
  }
  // Area
  if(filled.length>1){
    const aD='M '+filled.map((p,i)=>`${xOf(i)},${yOf(parseFloat(p.v))}`).join(' L ')+
      ` L ${xOf(filled.length-1)},${pT+iH} L ${xOf(0)},${pT+iH} Z`;
    const area=document.createElementNS(ns,'path');
    area.setAttribute('d',aD);area.setAttribute('fill',color);area.setAttribute('opacity','0.1');
    svg.appendChild(area);
    // Line
    const lD='M '+filled.map((p,i)=>`${xOf(i)},${yOf(parseFloat(p.v))}`).join(' L ');
    const lp=document.createElementNS(ns,'path');
    lp.setAttribute('d',lD);lp.setAttribute('fill','none');
    lp.setAttribute('stroke',color);lp.setAttribute('stroke-width','1.75');
    lp.setAttribute('stroke-linejoin','round');lp.setAttribute('stroke-linecap','round');
    svg.appendChild(lp);
  }
  // Dots + x labels (show every other label if many points)
  const showEvery=filled.length>8?3:filled.length>5?2:1;
  filled.forEach((p,i)=>{
    const cx=xOf(i),cy=yOf(parseFloat(p.v));
    const isLast=i===filled.length-1;
    const dot=document.createElementNS(ns,'circle');
    dot.setAttribute('cx',cx);dot.setAttribute('cy',cy);
    dot.setAttribute('r',isLast?3.5:2.5);
    dot.setAttribute('fill',isLast?color:'rgba(255,255,255,0.7)');
    dot.setAttribute('stroke',color);dot.setAttribute('stroke-width','1.5');
    svg.appendChild(dot);
    if(i%showEvery===0||isLast){
      const xt=document.createElementNS(ns,'text');
      xt.setAttribute('x',cx);xt.setAttribute('y',H-5);
      xt.setAttribute('text-anchor','middle');xt.setAttribute('font-size','6.5');
      xt.setAttribute('fill','#525252');xt.setAttribute('font-family','JetBrains Mono,monospace');
      xt.textContent='W'+String(p.w).padStart(2,'0');
      svg.appendChild(xt);
    }
  });
  return svg;
}

const METRIC_DIR={weight:false,bodyFat:false,waist:false,chest:true,hips:false,thigh:false,arm:true,runDist:true,golfHcp:false,totalLift:true};
const METRIC_META={
  weight:{label:'Body Weight',unit:'kg'},bodyFat:{label:'Body Fat',unit:'%'},
  waist:{label:'Waist',unit:'cm'},chest:{label:'Chest',unit:'cm'},
  hips:{label:'Hips',unit:'cm'},thigh:{label:'Thigh',unit:'cm'},

};

function mkWeek12Comparison(){
  const wrap=document.createElement('div');
  wrap.innerHTML='<div class="seclbl mf" style="margin-bottom:.625rem">WEEK 12 — TARGET vs ACTUAL</div>';

  const tgts=S.targets||{};
  const w12=S.measurements['w12']||{};
  // Get week 12 total lift
  const w12Lift=w12.totalLift||calcWeeklyLift(12);
  if(w12Lift)w12.totalLift=w12Lift;
  // Week 0 baseline
  const w0=S.measurements['w0']||{};

  const hasAnyTarget=Object.values(tgts).some(v=>v!==''&&v!==null&&v!==undefined);
  const hasAnyActual=Object.keys(w12).length>0;

  if(!hasAnyTarget&&!hasAnyActual){
    const empty=document.createElement('div');
    empty.style.cssText='border-radius:1rem;border:1px solid #262626;background:rgba(23,23,23,.4);padding:1.25rem;text-align:center;font-size:.75rem;color:#525252;font-family:JetBrains Mono,monospace;margin-bottom:1.25rem';
    empty.textContent='Set targets above and log Week 12 measurements to see comparison';
    wrap.appendChild(empty);return wrap;
  }

  const card=document.createElement('div');
  card.style.cssText='border-radius:1rem;border:1px solid rgba(38,38,38,.6);background:rgba(23,23,23,.4);overflow:hidden;margin-bottom:1.25rem';

  // Header row
  const hdr=document.createElement('div');
  hdr.style.cssText='display:grid;grid-template-columns:1fr .8fr .8fr .8fr;gap:.5rem;padding:.625rem .875rem;border-bottom:1px solid #262626;background:rgba(23,23,23,.6)';
  hdr.innerHTML='<span style="font-size:.5rem;font-family:JetBrains Mono,monospace;color:#525252;letter-spacing:.1em;text-transform:uppercase">Metric</span>'+
    '<span style="font-size:.5rem;font-family:JetBrains Mono,monospace;color:#525252;letter-spacing:.1em;text-transform:uppercase;text-align:right">Target</span>'+
    '<span style="font-size:.5rem;font-family:JetBrains Mono,monospace;color:#525252;letter-spacing:.1em;text-transform:uppercase;text-align:right">Wk 12</span>'+
    '<span style="font-size:.5rem;font-family:JetBrains Mono,monospace;color:#525252;letter-spacing:.1em;text-transform:uppercase;text-align:right">Δ</span>';
  card.appendChild(hdr);

  Object.entries(METRIC_META).forEach(([key,meta])=>{
    const tgt=tgts[key];
    const actual=w12[key];
    if(!tgt&&!actual)return;

    const tgtVal=tgt?parseFloat(tgt):null;
    const actVal=actual?parseFloat(actual):null;
    const delta=(tgtVal!==null&&actVal!==null)?actVal-tgtVal:null;
    const higherBetter=METRIC_DIR[key];

    // Met target?
    let status='';let statusColor='';
    if(delta!==null){
      const met=higherBetter?(actVal>=tgtVal):(actVal<=tgtVal);
      const close=Math.abs(delta/tgtVal)<0.05;
      status=met?'✓':(close?'~':'✗');
      statusColor=met?'#a3e635':(close?'#f59e0b':'#fb923c');
    }

    const row=document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:1fr .8fr .8fr .8fr;gap:.5rem;padding:.5rem .875rem;border-bottom:1px solid rgba(38,38,38,.3);align-items:center';

    row.innerHTML=`
      <span style="font-size:.75rem;color:#a3a3a3">${meta.label}</span>
      <span style="font-size:.75rem;font-family:'JetBrains Mono',monospace;color:#737373;text-align:right">${tgt?tgt+meta.unit:'—'}</span>
      <span style="font-size:.875rem;font-family:'JetBrains Mono',monospace;color:${actVal?'#fafaf9':'#525252'};text-align:right;font-weight:500">${actVal!==null?actVal+meta.unit:'—'}</span>
      <span style="font-size:.75rem;font-family:'JetBrains Mono',monospace;text-align:right;color:${statusColor||'#525252'}">
        ${delta!==null?(delta>0?'+':'')+delta.toFixed(1):''} ${status}
      </span>`;
    card.appendChild(row);
  });

  // Overall score
  let met=0,total=0;
  Object.entries(METRIC_META).forEach(([key])=>{
    const tgt=tgts[key];const actual=w12[key];
    if(!tgt||!actual)return;
    total++;
    const tgtV=parseFloat(tgt),actV=parseFloat(actual);
    if(METRIC_DIR[key]?actV>=tgtV:actV<=tgtV)met++;
  });
  if(total>0){
    const score=document.createElement('div');
    score.style.cssText='padding:.75rem .875rem;background:rgba(23,23,23,.6);display:flex;justify-content:space-between;align-items:center';
    const pct=Math.round((met/total)*100);
    const c=pct>=80?'#a3e635':pct>=50?'#f59e0b':'#fb923c';
    score.innerHTML=`<span style="font-size:.75rem;color:#a3a3a3;font-family:'JetBrains Mono',monospace">Targets hit</span>
      <span style="font-family:'Fraunces',Georgia,serif;font-size:1.25rem;font-weight:500;color:${c}">${met}/${total} <span style="font-size:.75rem">(${pct}%)</span></span>`;
    card.appendChild(score);
  }
  wrap.appendChild(card);
  return wrap;
}

function mkWeekStepsSummary(week){
  const WEEK_TGT=70000;const WEND_DAYS=new Set(['sat','sun']);
  const WDAY_TGT=7000,WEND_TGT=10000;
  let total=0,logged=0;
  const dayData=DAYS.map(d=>{
    const raw=(S.steps&&S.steps['w'+week+'-'+d])||'';
    const n=raw?parseInt(raw.replace(/,/g,'')):NaN;
    const hasData=!isNaN(n)&&raw!=='';
    if(hasData){total+=n;logged++;}
    return{d,n:hasData?n:null,tgt:WEND_DAYS.has(d)?WEND_TGT:WDAY_TGT};
  });
  if(logged===0)return null;
  const pct=Math.min(100,Math.round((total/WEEK_TGT)*100));
  const barColor=pct>=100?'#34d399':pct>=70?'#f59e0b':'#fb923c';

  const wrap=document.createElement('div');wrap.className='steps-week-wrap';
  const hdr=document.createElement('div');hdr.className='steps-week-hdr';
  hdr.innerHTML=`<span class="steps-week-lbl">Steps this week</span>
    <span class="steps-week-total" style="color:${barColor}">${total.toLocaleString()} <span style="color:#525252;font-size:.6rem">/ 70k</span></span>`;
  wrap.appendChild(hdr);

  // Bar chart per day
  const maxN=Math.max(...dayData.filter(x=>x.n!==null).map(x=>x.n),WEND_TGT);
  const grid=document.createElement('div');grid.className='steps-week-grid';
  dayData.forEach(({d,n,tgt})=>{
    const col=document.createElement('div');col.className='steps-day-col';
    const isWend=WEND_DAYS.has(d);
    const hit=n!==null&&n>=tgt;
    const miss=n!==null&&!hit;
    const barH=n!==null?Math.max(4,Math.round((n/maxN)*40)):0;
    const barColor2=hit?'#34d399':miss?(isWend?'#c084fc':'#fb923c'):'#262626';
    col.innerHTML=`
      <div class="steps-day-lbl" style="${isWend?'color:#c084fc':''}">${DAY_SHORT[d]}</div>
      <div class="steps-day-bar-wrap">
        <div class="steps-day-bar" style="height:${barH}px;background:${barColor2}"></div>
      </div>
      <div class="steps-day-val">${n!==null?(n>=1000?(n/1000).toFixed(1)+'k':n):'—'}</div>`;
    grid.appendChild(col);
  });
  wrap.appendChild(grid);

  // Progress toward 70k
  const pb=document.createElement('div');pb.className='steps-prog-bar-wrap';
  pb.innerHTML=`<div class="steps-prog-bar" style="width:${pct}%;background:${barColor}"></div>`;
  const pl=document.createElement('div');pl.className='steps-prog-lbl';
  pl.innerHTML=`<span class="steps-prog-txt">${pct}% of 70,000 weekly target</span>
    <span class="steps-prog-txt">${(WEEK_TGT-total).toLocaleString()} to go</span>`;
  wrap.appendChild(pb);wrap.appendChild(pl);
  return wrap;
}

function getWeekLabel(week){
  if(isWeekFuture(week))return null;
  const schd=getSchedule(week).d;
  let gym=0,run=0,yoga=0,golf=0,walk=0,swim=0;
  DAYS.forEach(d=>{
    const key='w'+week+'-'+d;
    if(!S.completions[key]?.done)return;
    const aid=(S.overrides&&S.overrides[key])||schd[d];
    if(aid.startsWith('gym'))gym++;
    else if(aid==='run')run++;
    else if(aid==='yoga')yoga++;
    else if(aid==='golf')golf++;
    else if(aid==='walk')walk++;
    else if(aid==='swim')swim++;
  });
  (S.extras||[]).filter(e=>e.week===week&&e.done).forEach(e=>{
    const a=e.activityId;
    if(a.startsWith('gym'))gym++;else if(a==='run')run++;
    else if(a==='yoga')yoga++;else if(a==='golf')golf++;
    else if(a==='walk')walk++;else if(a==='swim')swim++;
  });
  const total=gym+run+yoga+golf+walk+swim;
  const cardio=run+walk;
  const flex=yoga+golf;
  if(total<=1) return{label:"Death's Door",emoji:'💀',color:'#ef4444',bg:'rgba(239,68,68,.15)',total};
  if(total<=3) return{label:'Disaster',emoji:'🔥',color:'#fb923c',bg:'rgba(251,146,60,.15)',total};
  if(gym>=2&&gym<=3&&run>=2&&run<=3&&yoga>=1&&yoga<=2&&(golf+walk)>=1)
    return{label:'Balanced',emoji:'⚖️',color:'#a3e635',bg:'rgba(163,230,53,.15)',total};
  if((gym>=3||(gym>=2&&yoga>=2))&&cardio<=1)
    return{label:'Strength',emoji:'💪',color:'#f59e0b',bg:'rgba(245,158,11,.15)',total};
  if(cardio>=3||(cardio>=2&&cardio>gym&&cardio>=flex))
    return{label:'Cardio',emoji:'🏃',color:'#60a5fa',bg:'rgba(96,165,250,.15)',total};
  if(flex>=3||(flex>=2&&flex>gym&&flex>=cardio))
    return{label:'Flexibility',emoji:'🧘',color:'#c084fc',bg:'rgba(192,132,252,.15)',total};
  if(gym>=cardio&&gym>=flex&&gym>=1) return{label:'Strength',emoji:'💪',color:'#f59e0b',bg:'rgba(245,158,11,.15)',total};
  if(cardio>flex) return{label:'Cardio',emoji:'🏃',color:'#60a5fa',bg:'rgba(96,165,250,.15)',total};
  return{label:'Flexibility',emoji:'🧘',color:'#c084fc',bg:'rgba(192,132,252,.15)',total};
}

        ck.onclick=(e)=>{e.stopPropagation();
          const c=S.completions[compKey]||{exercises:{}};
          const exs={...c.exercises};const cur=exState({exercises:exs},ii);
          exs[ii]={done:!cur.done,sets:cur.sets,actual:cur.actual};
          S.completions={...S.completions,[compKey]:{...c,exercises:exs}};save();render();};

        const tg=document.createElement('span');tg.className='sunsal-target';tg.textContent='Goal: 100 / year';

        const ir=document.createElement('div');ir.className='sunsal-inp-row';

        const inp=document.createElement('input');inp.className='sunsal-inp';

        inp.setAttribute('data-compkey',compKey);inp.setAttribute('data-yogi',ii);

        ir.append(lb,inp);
        const pw=document.createElement('div');pw.className='sunsal-prog-wrap';
        pw.innerHTML=`<div class="sunsal-prog-lbl"><span class="sunsal-prog-txt">${totalSS} total · ${Math.max(0,100-totalSS)} to go</span><span class="sunsal-prog-pct">${pct.toFixed(0)}%</span></div><div class="sunsal-bar"><div class="sunsal-bar-fill" style="width:${pct}%"></div></div>`;
        ssRow.append(ssHdr,ir,pw);inner.appendChild(ssRow);return;
      }
      const row=document.createElement('div');row.className='irow';row.style.cursor='pointer';
      const ck=document.createElement('button');ck.className='ck'+(es.done?' on':'');
      ck.style.background=es.done?yogaColor:'transparent';
      ck.innerHTML=es.done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'';
      const nm=document.createElement('span');nm.className='inm'+(es.done?' dn':'');nm.textContent=item.n;
      const ytBOY=ytBtn(item.n);if(ytBOY)nm.appendChild(ytBOY);
      const aw=document.createElement('div');aw.className='actual-wrap';
      const al=document.createElement('span');al.className='actual-lbl';al.textContent=item.d||'';
      const ai=document.createElement('input');ai.className='actual-inp';
      ai.type='text';ai.placeholder='actual';ai.value=es.actual||'';
      ai.setAttribute('data-compkey',compKey);ai.setAttribute('data-yogi',ii);
      ai.onclick=(e)=>e.stopPropagation();
      aw.append(al,ai);
      ck.onclick=(e)=>{e.stopPropagation();
        const c=S.completions[compKey]||{exercises:{}};
        const exs={...c.exercises};const cur=exState({exercises:exs},ii);
        exs[ii]={done:!cur.done,sets:cur.sets,actual:cur.actual};
        S.completions={...S.completions,[compKey]:{...c,exercises:exs}};save();render();};
      row.append(ck,nm,aw);row.onclick=()=>ck.onclick(new Event('c'));
      inner.appendChild(row);
    });

    exp.appendChild(inner);wrap.appendChild(exp);

    const ca=document.createElement('div');ca.className='carea';
    const dr=document.createElement('div');dr.className='date-row';
    const dl=document.createElement('span');dl.className='date-lbl';dl.textContent='Session date';
    const di=document.createElement('input');di.type='date';di.className='date-inp';
    di.max=isoToday();di.value=comp.sessionDate||getExpectedDate(week,day);
    di.onchange=(e)=>{
      const c=S.completions[compKey]||{};
      S.completions={...S.completions,[compKey]:{...c,sessionDate:e.target.value}};save();
    };
    dr.append(dl,di);ca.appendChild(dr);
    const cb=document.createElement('button');cb.className='cbtn'+(isDone?' dn':'');
    cb.style.background=isDone?'':yogaColor;cb.style.color=isDone?'':'#0a0a0a';
    cb.textContent=isDone?'✓ COMPLETE':'MARK COMPLETE';
    cb.onclick=()=>{
      const c=S.completions[compKey]||{};
      S.completions={...S.completions,[compKey]:{...c,done:!c.done,completedAt:!c.done?(c.sessionDate||isoToday()):null}};
      save();render();
    };
    ca.appendChild(cb);wrap.appendChild(ca);
  }
  return wrap;
}

function mkSetupScreen(){
  const div=document.createElement('div');div.className='setup-screen';
  div.innerHTML=`<div class="setup-logo">P</div>
    <div class="setup-title">Programme Tracker</div>
    <div class="setup-sub">Personal fitness tracker.<br>Who's training today?</div>`;

  const existingUsers=getUsers();

  // Show existing users
  if(existingUsers.length>0){
    const ul=document.createElement('div');ul.className='user-list';
    const ulbl=document.createElement('div');ulbl.className='user-list-lbl';ulbl.textContent='Select profile';
    ul.appendChild(ulbl);
    existingUsers.forEach(name=>{
      const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:.375rem;margin-bottom:.375rem';
      const ub=document.createElement('button');ub.className='user-btn';
      ub.innerHTML=`<span style="font-size:1rem">👤</span>
        <span style="flex:1;text-align:left">${name}</span>
        <span class="user-btn-arrow">→</span>`;
      ub.onclick=()=>{
        try{
          const saved=localStorage.getItem(userKey(name));
          if(saved){S=Object.assign(defState(),JSON.parse(saved));}
          else{S=defState();S.userName=name;}
        }catch{S=defState();S.userName=name;}
        S.userName=name;
        localStorage.setItem('prgm-current-user',name);
        save();render();
      };
      const db=document.createElement('button');db.className='del-user-btn';db.title='Delete profile';
      db.innerHTML='🗑';
      db.onclick=(e)=>{e.stopPropagation();
        if(confirm('Delete '+name+"'s profile? All their data will be lost.")){
          localStorage.removeItem(userKey(name));
          const u=getUsers().filter(n=>n!==name);saveUsers(u);
          if(localStorage.getItem('prgm-current-user')===name)localStorage.removeItem('prgm-current-user');
          render();
        }
      };
      row.append(ub,db);ul.appendChild(row);
    });
    div.appendChild(ul);
    // Divider
    const divd=document.createElement('div');divd.className='setup-divider';
    divd.innerHTML='<div class="setup-divider-line"></div><span class="setup-divider-txt">OR</span><div class="setup-divider-line"></div>';
    div.appendChild(divd);
  }

  // New user form
  const newLbl=document.createElement('div');newLbl.className='setup-label';
  newLbl.textContent=existingUsers.length>0?'Add new profile':'Your name';
  const inp=document.createElement('input');inp.className='setup-inp';
  inp.type='text';inp.placeholder='e.g. Amit Suri';inp.autocomplete='name';
  inp.onfocus=(e)=>e.target.select();
  const btn=document.createElement('button');btn.className='setup-btn';
  btn.textContent=existingUsers.length>0?'Create Profile →':'Get Started →';
  const doSave=()=>{
    const name=inp.value.trim();
    if(!name)return inp.focus();
    // Check if migrating legacy data
    const legacy=localStorage.getItem(BASE_KEY);
    if(legacy&&existingUsers.length===0){
      try{
        const lp=JSON.parse(legacy);
        if(lp&&!lp.userName){S=Object.assign(defState(),lp);}
      }catch{}
    } else {
      S=defState();
    }
    S.userName=name;
    // Register user
    const users=getUsers();
    if(!users.includes(name)){users.push(name);saveUsers(users);}
    localStorage.setItem('prgm-current-user',name);
    save();render();
  };
  btn.onclick=doSave;
  inp.onkeydown=(e)=>{if(e.key==='Enter')doSave();};
  div.append(newLbl,inp,btn);
  return div;
}
// =========================================================
// RENDER ENGINE — targeted updates to avoid destroying inputs
// =========================================================
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(!S.userName){app.appendChild(mkSetupScreen());return;}
  app.appendChild(mkHeader());
  app.appendChild(mkTabs());
  if(S.tab==='today')     app.appendChild(mkToday());
  else if(S.tab==='week') app.appendChild(mkWeek());
  else                    app.appendChild(mkProgress());
}

// =========================================================
// ACTIVITY CARD (shared by Today + Week views)
// =========================================================
function mkCard(day,week,isToday){
  const _sk='w'+week+'-'+day;
  const aid=(S.overrides&&S.overrides[_sk])||getSchedule(week).d[day];
  const isCustom=!!(S.overrides&&S.overrides[_sk]);
  const ph=getSchedule(week).ph;
  const det=getDetail(aid,week);
  const compKey='w'+week+'-'+day;
  const comp=S.completions[compKey]||{};
  const isDone=!!comp.done;
  const expanded=S.expanded===day;

  const card=document.createElement('div');
  card.className='card'+(isToday?' tod':'')+(isDone?' dn':'');

  // Header button
  const hdr=document.createElement('button');
  hdr.className='chdr';
  hdr.innerHTML=`
    <div class="icwrap" style="background:${det.tint};border:1px solid ${det.border}">
      <span style="font-size:1.125rem;line-height:1">${det.icon}</span>
    </div>
    <div class="cbody">
      <div class="cmr">
        <span class="cdlbl mf">${DAY_NAMES[day]}${isToday?'<span class="todtag"> · TODAY</span>':''}${isCustom?'<span class="custom-tag">custom</span>':''}</span>
        <span class="chev${expanded?' op':''}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
      <div class="cname">${det.name}</div>
      <div class="cfoc">${det.focus}</div>
    </div>`;
  hdr.onclick=()=>{S.expanded=(expanded?null:day);save();render();};
  card.appendChild(hdr);

  // Swap bar
  const swapBar=document.createElement('button');
  swapBar.className='swap-bar'+(S.swapping===_sk?' open':'');
  swapBar.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
    <span>${S.swapping===_sk?'▲ cancel':'Change session'}</span>`;
  swapBar.onclick=(e)=>{e.stopPropagation();S.swapping=(S.swapping===_sk?null:_sk);save();render();};
  card.appendChild(swapBar);

  // Activity picker
  if(S.swapping===_sk){
    const picker=document.createElement('div');picker.className='act-picker';
    Object.entries(ACT).forEach(([id,m])=>{
      const pill=document.createElement('button');pill.className='act-pill';
      const isCur=id===aid;
      pill.style.cssText=`border-color:${m.border};background:${isCur?m.color:m.tint};color:${isCur?'#0a0a0a':'var(--t1)'}`;
      pill.innerHTML=`${m.icon} ${m.label}`;
      pill.onclick=()=>{
        if(id===getSchedule(week).d[day]){if(S.overrides)delete S.overrides[_sk];}
        else{if(!S.overrides)S.overrides={};S.overrides[_sk]=id;}
        S.swapping=null;save();render();
      };
      picker.appendChild(pill);
    });
    card.appendChild(picker);
  }


  if(expanded){
    const exp=document.createElement('div');exp.className='cexp fade';
    const inner=document.createElement('div');inner.className='cein';

    if(det.isGym && det.items){
      det.items.forEach((ex,ei)=>{
        const es=exState(comp,ei);
        const prev=findPrev(ex.n,week,day);
        const bw=isBW(ex);
        const numSets=ex.s;

        const row=document.createElement('div');row.className='exrow';

        // Header row
        const rowHdr=document.createElement('div');rowHdr.className='exhdr';
        const ckBtn=document.createElement('button');
        ckBtn.className='ck'+(es.done?' on':'');
        ckBtn.style.background=es.done?det.color:'transparent';
        ckBtn.innerHTML=es.done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':'';
        ckBtn.onclick=()=>toggleEx(compKey,ei,es,det.color,ckBtn,nmEl);
        const nmEl=document.createElement('span');nmEl.className='exnm'+(es.done?' dn':'');nmEl.textContent=ex.n;
        const ytB=ytBtn(ex.n);if(ytB)nmEl.appendChild(ytB);
        const mtEl=document.createElement('span');mtEl.className='exmt mf';
        mtEl.innerHTML=`${ex.s} × ${ex.r}<span class="exrs">${ex.rest}</span>`;
        rowHdr.append(ckBtn,nmEl,mtEl);

        // Sets grid
        const grid=document.createElement('div');
        grid.className='sgrid';
        grid.style.gridTemplateColumns=`repeat(${numSets},minmax(0,1fr))`;

        for(let si=0;si<numSets;si++){
          const s=es.sets[si]||{};
          const pw=prev?.sets[si]?.weight||'';
          const pr=prev?.sets[si]?.reps||'';
          const sc=document.createElement('div');
          sc.className='scard'+(s.weight||s.reps?' fi':'');
          sc.dataset.key=compKey;sc.dataset.ei=ei;sc.dataset.si=si;

          let inner2=`<div class="snum mf">SET ${si+1}</div>`;
          if(!bw){
            inner2+=`<input class="sinp wt" type="text" inputmode="decimal" placeholder="${pw||'—'}" value="${s.weight||''}" data-f="weight" data-key="${compKey}" data-ei="${ei}" data-si="${si}">`;
            inner2+=`<div class="sunt mf">kg</div>`;
          }
          inner2+=`<input class="sinp rp" type="text" inputmode="numeric" placeholder="${pr||'—'}" value="${s.reps||''}" data-f="reps" data-key="${compKey}" data-ei="${ei}" data-si="${si}">`;
          inner2+=`<div class="sunt mf">reps</div>`;
          sc.innerHTML=inner2;
          grid.appendChild(sc);
        }

        row.append(rowHdr,grid);

        // Progression hint
        if(prev){
          const ph2=document.createElement('div');ph2.className='pvhint';
          const setTxt=prev.sets.slice(0,4).map(s=>{
            const p=[];if(s.weight)p.push(s.weight+'kg');if(s.reps)p.push(s.reps);
            return'<span class="pvset">'+p.join('×')+'</span>';
          }).join(' <span style="color:#3d3d3d">·</span> ');

          let deltaBadge='';
          const prevW=parseFloat(prev.sets[0]?.weight);
          const curW=parseFloat(es.sets[0]?.weight);
          if(!isNaN(prevW)&&!isNaN(curW)&&curW!==prevW){
            const d=curW-prevW;
            deltaBadge=`<span class="delta" style="color:${d>0?det.color:'#a3a3a3'};background:${d>0?det.color+'20':'transparent'}">${d>0?'+':''}${d}kg</span>`;
          }
          ph2.innerHTML=`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            <span class="pvtxt mf"><span style="color:#525252">Last (${prev.label}):</span> ${setTxt}</span>${deltaBadge}`;
          row.appendChild(ph2);
        }
        inner.appendChild(row);
      });
    } else if(det.items){

        const es=exState(comp,ii);

          ssInp.onclick=(e)=>e.stopPropagation();ssInp.onfocus=(e)=>e.target.select();

// =========================================================
// INPUT EVENTS — attached after render via delegation
// =========================================================
document.addEventListener('input',e=>{
  // Yoga actual duration inputs
  if(e.target.classList.contains('actual-inp')){
    const inp=e.target;
    const ck=inp.getAttribute('data-compkey');const yi=+inp.getAttribute('data-yogi');
    if(ck){
      const c=S.completions[ck]||{exercises:{}};
      const exs={...(c.exercises||{})};
      const cur=exState({exercises:exs},yi);
      exs[yi]={...cur,actual:inp.value};
      S.completions={...S.completions,[ck]:{...c,exercises:exs}};save();
    }return;
  }
  // Run / generic log inputs
  if(e.target.hasAttribute('data-logkey')){
    const inp=e.target;
    const lk=inp.getAttribute('data-logkey');const lf=inp.getAttribute('data-logf');
    if(lk&&lf){
      const c=S.completions[lk]||{};
      const rl={...(c.runLog||{})};rl[lf]=inp.value;
      S.completions={...S.completions,[lk]:{...c,runLog:rl}};save();
    }return;
  }
  const inp=e.target;
  if(!inp.classList.contains('sinp'))return;
  const {key,ei,si,f}=inp.dataset;
  if(!key)return;
  const c=S.completions[key]||{exercises:{}};
  const exs={...c.exercises};
  const es=exState({exercises:exs},+ei);
  const sets=es.sets.slice();
  while(sets.length<=+si)sets.push({});
  sets[+si]={...sets[+si],[f]:inp.value};
  exs[+ei]={done:es.done,sets};
  S.completions={...S.completions,[key]:{...c,exercises:exs}};
  save();
  // update .fi class on parent set-card
  const sc=inp.closest('.scard');
  if(sc){
    const wt=sc.querySelector('[data-f="weight"]');
    const rp=sc.querySelector('[data-f="reps"]');
    const hasVal=(wt&&wt.value)||(rp&&rp.value);
    sc.classList.toggle('fi',!!hasVal);
  }
});

document.addEventListener('focus',e=>{

},true);

  yesterdayBtn.className='past-nav-btn';
  yesterdayBtn.innerHTML='← Yesterday';
  yesterdayBtn.onclick=()=>{
    // Go to yesterday's day in week view
    const yd=new Date();yd.setDate(yd.getDate()-1);
    const ydDay=DAY_JS[yd.getDay()];
    // If yesterday was in current week, just switch to week view
    const wkStart=weekStartDate(S.week);
    const wkEnd=weekEndDate(S.week);
    wkStart.setHours(0,0,0,0);wkEnd.setHours(23,59,59);yd.setHours(12,0,0);
    if(yd>=wkStart&&yd<=wkEnd){
      S.tab='week';S.expanded=ydDay;save();render();
    } else {
      // Yesterday was in previous week
      if(S.week>0){S.week--;S.tab='week';S.expanded=ydDay;save();render();}
    }
  };
  const editWeekBtn=document.createElement('button');
  editWeekBtn.className='past-nav-btn accent';
  editWeekBtn.innerHTML='📋 Edit this week';
  editWeekBtn.onclick=()=>{S.tab='week';save();render();};
  const prevWeekBtn=document.createElement('button');
  prevWeekBtn.className='past-nav-btn';
  prevWeekBtn.innerHTML='← Prev week';
  prevWeekBtn.onclick=()=>{if(S.week>0){S.week--;S.tab='week';save();render();}};
  pastNav.append(yesterdayBtn,editWeekBtn,prevWeekBtn);
  div.appendChild(pastNav);
  // Weekly steps summary
  const wss=mkWeekStepsSummary(S.week);
  if(wss)div.appendChild(wss);
  // Monday measurement prompt
  if(todayDayKey()==='mon'){
    const mpW=document.createElement('div');mpW.style.cssText='padding:0 1.25rem;margin-top:.375rem';
    mpW.appendChild(mkMondayPrompt(S.week));
    div.appendChild(mpW);

  const stepsW=document.createElement('div');stepsW.style.cssText='padding:0 1.25rem;margin-top:0';
  stepsW.appendChild(mkStepsRow(S.week,today));
  // Today's extras
  const todayExtras=(S.extras||[]).filter(e=>{
    const d=e.date||'';return d===isoToday();

    todayExtras.forEach(ex=>{const ec=mkExtraCard(ex);if(ec)ew.appendChild(ec);});
    div.append(dl,cw,stepsW,ew,sw,rw);
  } else {
    div.append(dl,cw,stepsW,sw,rw);
  }
  // Add session button for today
  const addW=document.createElement('div');addW.style.cssText='padding:0 1.25rem';
  addW.appendChild(mkAddSessionBtn(S.week,todayDayKey()));
  div.appendChild(addW);
  return div;
}

function mkWeek(){
  const div=document.createElement('div');div.className='wview fade';
  const today=todayDayKey();
  // Week banner — shows which week is being edited
  const isPastWeek=isWeekFuture(S.week)===false&&S.week<parseInt((() => {
    const now=new Date();now.setHours(0,0,0,0);
    for(let w=0;w<=24;w++){const ws=weekStartDate(w);ws.setHours(0,0,0,0);const we=weekEndDate(w);we.setHours(23,59,59,999);if(now>=ws&&now<=we)return w;}return S.week;
  })());
  if(isPastWeek||isWeekFuture(S.week)){
    const banner=document.createElement('div');
    banner.style.cssText='margin:.75rem 1.25rem .25rem;padding:.5rem .875rem;border-radius:.625rem;font-size:.6875rem;font-family:JetBrains Mono,monospace;letter-spacing:.05em;text-align:center;'+
      (isPastWeek?'background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:#60a5fa':

    banner.textContent=isPastWeek?'📝 Editing past week — '+fmtWeekRange(S.week):'📅 Future week — '+fmtWeekRange(S.week);
    div.appendChild(banner);
  }
  DAYS.forEach(d=>{
    div.appendChild(mkCard(d,S.week,d===today));
    // Optional yoga after run in Phase 3
    const _aid=(S.overrides&&S.overrides['w'+S.week+'-'+d])||getSchedule(S.week).d[d];
    if(_aid==='run'&&getSchedule(S.week).ph>=3) div.appendChild(mkOptionalYogaCard(S.week,d));
    div.appendChild(mkStepsRow(S.week,d));
    // Show extras for this week+day
    const dayExtras=(S.extras||[]).filter(e=>e.week===S.week&&e.day===d);

    dayExtras.sort((a,b)=>new Date(a.date)-new Date(b.date));

      const ec=mkExtraCard(ex);if(ec)div.appendChild(ec);

    div.appendChild(mkAddSessionBtn(S.week,d));
  });
  return div;
}

  for(let i=0;i<90;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    if(Object.values(S.completions).some(c=>c.completedAt===iso&&c.done))streak++;

  const byType={};

      const aid=(S.overrides&&S.overrides[key])||schd[d];
      if(aid.startsWith('gym'))gym++;else if(aid==='run')run++;
      else if(aid==='yoga')yoga++;else if(aid==='golf')golf++;else if(aid==='walk')walk++;
    });
    (S.extras||[]).filter(e=>e.week===w&&e.done).forEach(e=>{
      const a=e.activityId;
      if(a.startsWith('gym'))gym++;else if(a==='run')run++;
      else if(a==='yoga')yoga++;else if(a==='golf')golf++;else if(a==='walk')walk++;
    });
    const row=document.createElement('div');row.className='wk-profile-row';
    const parts=[];
    if(gym)parts.push(gym+'× gym');if(run)parts.push(run+'× run');
    if(yoga)parts.push(yoga+'× yoga');if(golf)parts.push(golf+'× golf');
    if(walk)parts.push(walk+'× walk');
    const isFut=isWeekFuture(w);
    row.innerHTML=`
      <span class="wk-profile-num mf" style="width:3.5rem">W${String(w).padStart(2,'0')} <span style="color:#3d3d3d;font-size:.45rem">${fmtWeekRange(w)}</span></span>
      ${lbl?`<span class="wk-profile-badge" style="color:${lbl.color};background:${lbl.bg}">${lbl.emoji} ${lbl.label}</span>`:'<span class="wk-profile-badge" style="color:#525252;background:rgba(38,38,38,.4)">Upcoming</span>'}
      <span class="wk-profile-detail">${isFut?'':(parts.join(' · ')||'No sessions yet')}</span>`;
    wpCard.appendChild(row);
  }
  wpEl.appendChild(wpCard);div.appendChild(wpEl);

rst.onclick=()=>{if(confirm('Reset all completions? Cannot be undone.')){S.completions={};save();render();}};
  div.appendChild(rst);

  return div;
}

// =========================================================
// INSTALL HINT (shown only when not in standalone)
// =========================================================
function maybeShowInstall(){
  if(window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches)return;
  const hint=document.createElement('div');hint.className='ihint';
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid=/android/i.test(navigator.userAgent);
  if(isIOS)
    hint.innerHTML='<b>Add to Home Screen</b> for offline gym use:<br>Tap the Share icon → "Add to Home Screen"';
  else if(isAndroid)
    hint.innerHTML='<b>Install as app</b> for offline gym use:<br>Tap the menu → "Add to Home screen" or "Install app"';
  else
    hint.innerHTML='<b>Save this file</b> — it works completely offline once saved to your phone.';
  document.getElementById('app').appendChild(hint);
}

// =========================================================
// INIT
// =========================================================
render();
setTimeout(maybeShowInstall,500);
</script>
